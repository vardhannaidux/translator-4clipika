services:
  - type: web
    name: eenadu-4c-translator
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: LOG_LEVEL
        value: INFO
